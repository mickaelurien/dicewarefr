    <!-- Données structurées JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Diceware FR",
      "url": "https://dicewarefr.fr/",
      "description": "Générateur de phrases de passe sécurisées en français basé sur la méthode Diceware. Génération 100% locale, aucune donnée transmise.",

      "operatingSystem": "All",
      "browserRequirements": "Requires JavaScript",

      "isAccessibleForFree": true,
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"

    <!-- FAQ structurée JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce que la méthode Diceware ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Diceware est une méthode de génération de phrases de passe utilisant des mots aléatoires issus d'une liste prédéfinie. Chaque mot est sélectionné par un tirage aléatoire cryptographique, garantissant une sécurité élevée."
          }
        },
        {
          "@type": "Question",
          "name": "Les phrases de passe générées sont-elles sécurisées ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. La génération est réalisée 100% côté client via l'API Web Crypto du navigateur. Aucune phrase de passe n'est jamais envoyée à un serveur."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de mots faut-il pour un mot de passe sécurisé ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "5 mots Diceware offrent environ 64 bits d'entropie, 6 mots environ 77 bits. Pour une sécurité maximale contre les attaques modernes, 6 mots ou plus sont recommandés."
          }
        }
      ]
    }
    </script>
